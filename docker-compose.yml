version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: cms-blog-mongo
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret123
      MONGO_INITDB_DATABASE: cms_blog
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: cms-blog-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: